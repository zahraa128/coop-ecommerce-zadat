<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Shop</title>

  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/shop.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

  <div id="header"></div>

  <main class="shop-page">
    <div class="shop-heading">
      <span class="shop-kicker">Cooperative Collection</span>
      <h2 class="shop-title">Browse Products</h2>
      <p>Discover carefully made natural products from Zadat Al Khayrat Cooperative.</p>
    </div>

    <div class="category-filter" id="categoryFilter">
      <button class="filter-btn" data-category="">All</button>
    </div>

    <div class="product-container" id="productContainer"></div>
  </main>

  <div id="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/shop.js"></script>
  <script src="js/layout.js"></script>
  <script type="module" src="js/speed-insights-init.js"></script>
</body>
</html>
