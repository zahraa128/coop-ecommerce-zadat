<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Brochure | Cooperative</title>

  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/brochure.css">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>
  <div id="header"></div>

  <main class="brochure-page">
    <section class="brochure-section" aria-labelledby="brochureTitle">
      <div class="brochure-heading">
        <span class="brochure-kicker">Premium Catalog</span>
        <h1 id="brochureTitle">Brochure</h1>
        <p>Explore our products catalog</p>
      </div>

      <div class="brochure-viewer brochure-viewer-full" data-brochure-viewer aria-label="Brochure pages">
        <div class="brochure-toolbar" aria-label="Brochure navigation">
          <button class="brochure-nav-btn" type="button" data-brochure-prev aria-label="Previous brochure page">
            <i class="fa-solid fa-chevron-left" aria-hidden="true"></i>
          </button>

          <span class="brochure-page-count" data-brochure-count>Page 1 / 6</span>

          <button class="brochure-nav-btn" type="button" data-brochure-next aria-label="Next brochure page">
            <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
          </button>
        </div>

        <div class="brochure-table" aria-hidden="true"></div>
        <div class="brochure-book" data-brochure-book aria-live="polite"></div>
      </div>
    </section>
  </main>

  <div class="brochure-modal" id="brochureModal" aria-hidden="true" role="dialog" aria-label="Brochure image preview">
    <button class="brochure-modal-close" type="button" aria-label="Close brochure preview">&times;</button>
    <img src="" alt="">
  </div>

  <div id="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/brochure.js"></script>
  <script src="js/layout.js"></script>
</body>
</html>
