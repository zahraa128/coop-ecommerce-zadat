<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Contact Us</title>

  <link rel="stylesheet" href="styles/contactus.css">
  <link rel="stylesheet" href="styles/header.css">

  <!-- Icons -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
</head>

<body>

  <!-- HEADER -->
  <div id="header"></div>

  <main class="contact-container">
    <h2>Contact Us</h2>

    <div class="contact-buttons">
      <a id="whatsapp" class="contact-btn whatsapp" target="_blank">
        <i class="fab fa-whatsapp"></i> WhatsApp
      </a>

      <a id="instagram" class="contact-btn instagram" target="_blank">
        <i class="fab fa-instagram"></i> Instagram
      </a>

      <a id="messenger" class="contact-btn messenger" target="_blank">
        <i class="fab fa-facebook-messenger"></i> Messenger
      </a>
    </div>
  </main>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script src="js/config.js"></script>
  <script src="js/contuct.js"></script> 
  <script src="js/layout.js"></script>

  <script type="module" src="js/speed-insights-init.js"></script>
</body>
</html>
