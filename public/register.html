<!DOCTYPE html>
<html lang="en">
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Create Account</title>

  <link rel="stylesheet" href="styles/auth.css">
</head>

<body>

  <div class="auth-container">
    <h2>Create Account</h2>

    <p id="msg"></p>

    <form id="registerForm">

      <label>Full Name:</label><br>
      <input type="text" id="full_name" required><br><br>

      <label>Phone:</label><br>
      <input type="text" id="phone" required><br><br>

      <label>Email:</label><br>
      <input type="email" id="email" required><br><br>

      <label>Address (Required):</label><br>
      <input type="text" id="address" required><br><br>

      <label>Password:</label><br>
      <input type="password" id="password" required><br><br>

      <label>Confirm Password:</label><br>
      <input type="password" id="confirm_password" required><br><br>

      <button type="submit">Register</button>
    </form>

    <p>
      Already have an account?
      <a href="login_user.html">Login</a>
    </p>
  </div>

  <script src="js/config.js"></script>
  <script src="js/register.js"></script>
  <script type="module" src="js/speed-insights-init.js"></script>
</body>
</html>
